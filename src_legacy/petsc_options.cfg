# PETSc options for legacy FEniCS (dolfin)
#
# This file uses the flat PETSc options format that is compatible with all
# PETSc versions supported by legacy FEniCS (typically PETSc 3.9 – 3.20).
#
# The YAML-nested format used in the FEniCSx version requires PETSc >= 3.19.
#
# Note on the line search:
#   The "bisection" line search type (snes_linesearch_type bisection) was
#   introduced in PETSc 3.23 and is especially effective for the inf-norm
#   strength-potential problem.  For older PETSc, the back-tracking line
#   search ("bt") is used instead.  Switch to "bisection" if you build
#   against PETSc >= 3.23.
#
# ── (u, η) solver – 1D ───────────────────────────────────────────────────────
-un_snes_type vinewtonrsls
-un_snes_stol 1.0e-32
-un_snes_rtol 1.0e-32
-un_snes_atol 2.0e-9
-un_snes_max_it 10000
-un_snes_max_fail 500
-un_snes_divergence_tolerance 1e10
-un_snes_max_funcs 1000000000
-un_snes_monitor
-un_snes_converged_reason
-un_snes_linesearch_type bt
-un_snes_linesearch_monitor
-un_snes_linesearch_atol 1.0e-15
-un_snes_linesearch_rtol 0.0
-un_ksp_type preonly
-un_pc_type cholesky
-un_pc_factor_mat_solver_type mumps
-un_mat_mumps_icntl_1 6
-un_mat_mumps_icntl_2 0
-un_mat_mumps_icntl_3 6
-un_mat_mumps_icntl_4 1
-un_mat_mumps_icntl_14 100
-un_mat_mumps_icntl_23 10000

# ── (u, η_tr, η_dev) solver – 2D ─────────────────────────────────────────────
-untrndev_snes_type vinewtonrsls
-untrndev_snes_stol 1.0e-32
-untrndev_snes_rtol 1.0e-32
-untrndev_snes_atol 1.2e-9
-untrndev_snes_max_it 20000
-untrndev_snes_max_fail 500
-untrndev_snes_divergence_tolerance 1e10
-untrndev_snes_max_funcs 1000000000
-untrndev_snes_monitor
-untrndev_snes_converged_reason
-untrndev_snes_linesearch_type bt
-untrndev_snes_linesearch_monitor
-untrndev_snes_linesearch_atol 1.0e-15
-untrndev_snes_linesearch_rtol 0.0
-untrndev_snes_linesearch_max_it 50
-untrndev_ksp_type preonly
-untrndev_pc_type cholesky
-untrndev_pc_factor_mat_solver_type mumps
-untrndev_mat_mumps_icntl_1 6
-untrndev_mat_mumps_icntl_2 0
-untrndev_mat_mumps_icntl_3 6
-untrndev_mat_mumps_icntl_4 1
-untrndev_mat_mumps_icntl_14 500
-untrndev_mat_mumps_icntl_23 10000

# ── α (damage) solver ─────────────────────────────────────────────────────────
-a_snes_type vinewtonrsls
-a_snes_stol 1.0e-32
-a_snes_rtol 1.0e-32
-a_snes_atol 1.0e-9
-a_snes_max_it 10000
-a_snes_max_fail 500
-a_snes_divergence_tolerance 1e10
-a_snes_max_funcs 1000000000
-a_snes_monitor
-a_snes_converged_reason
-a_snes_linesearch_type bt
-a_snes_linesearch_monitor
-a_snes_linesearch_atol 1.0e-12
-a_snes_linesearch_rtol 0.0
-a_snes_linesearch_max_it 50
-a_ksp_type preonly
-a_pc_type cholesky
-a_pc_factor_mat_solver_type mumps
-a_mat_mumps_icntl_1 6
-a_mat_mumps_icntl_2 0
-a_mat_mumps_icntl_3 6
-a_mat_mumps_icntl_4 1
-a_mat_mumps_icntl_14 100
-a_mat_mumps_icntl_23 10000

-options_left false
